[build]
  command = "npm --workspace busgo-bulgaria run build"
  publish = "busgo-bulgaria/dist"
  functions = "busgo-bulgaria/netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["busgo-bulgaria/server/db.json"]

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api/auth/:splat"
  status = 200

[[redirects]]
  from = "/assistant"
  to = "/.netlify/functions/api/assistant"
  status = 200

[[redirects]]
  from = "/cities"
  to = "/.netlify/functions/api/cities"
  status = 200

[[redirects]]
  from = "/routes/*"
  to = "/.netlify/functions/api/routes/:splat"
  status = 200

[[redirects]]
  from = "/routes"
  to = "/.netlify/functions/api/routes"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/api/admin/:splat"
  status = 200

[[redirects]]
  from = "/seats/*"
  to = "/.netlify/functions/api/seats/:splat"
  status = 200

[[redirects]]
  from = "/bookings/*"
  to = "/.netlify/functions/api/bookings/:splat"
  status = 200

[[redirects]]
  from = "/bookings"
  to = "/.netlify/functions/api/bookings"
  status = 200

[[redirects]]
  from = "/payments"
  to = "/.netlify/functions/api/payments"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
